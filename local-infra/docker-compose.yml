services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-server
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  agent:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: aiagent-platform
    ports:
      - "5000:5000"
    environment:
      - Ollama__BaseUrl=http://ollama:11434
      - Qdrant__Endpoint=http://qdrant:6333
      - Agent__ProjectPath=/app/project
      - Agent__RequireConfirmation=false
      - Agent__WatchDocumentation=true
    volumes:
      - ../tests/ProjectAIAgent.Sandbox/SandboxApp:/app/project
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data: